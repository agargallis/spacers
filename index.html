<!doctype html>
<html lang="el" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/spacers.png" />

    <!-- iOS "Add to Home Screen" app icon + standalone web-app behaviour -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Spacers Athens" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Spacers Athens" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Per-page PWA start_url: "Add to Home Screen" launches the exact page you
         pinned (e.g. an admin route) instead of always opening the root. -->
    <script>
      (function () {
        try {
          var manifest = {
            name: "Spacers Athens",
            short_name: "Spacers",
            display: "standalone",
            orientation: "portrait",
            background_color: "#0A0B0F",
            theme_color: "#0A0B0F",
            scope: "/",
            start_url: window.location.pathname + window.location.search,
            id: window.location.pathname,
            icons: [
              { src: "/pwa-192.png", sizes: "192x192", type: "image/png", purpose: "any" },
              { src: "/pwa-512.png", sizes: "512x512", type: "image/png", purpose: "any" },
              { src: "/apple-touch-icon-1024.png", sizes: "1024x1024", type: "image/png", purpose: "any" }
            ]
          };
          var href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" }));
          var link = document.querySelector('link[rel="manifest"]');
          if (!link) { link = document.createElement("link"); link.rel = "manifest"; document.head.appendChild(link); }
          link.setAttribute("href", href);
        } catch (e) {}
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0B0F" />
    <link rel="preload" href="/fonts/acvarela.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Spacers Athens | Επίσημη ιστοσελίδα της μπασκετικής ομάδας. Βαθμολογίες, πρόγραμμα και αποτελέσματα για Main & Beta."
    />
    <title>Spacers Athens | Basketaki The League</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
